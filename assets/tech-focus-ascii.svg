<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="Animated ASCII terminal profile for fullstack_1ape — the code ape that ships 0 to 1 solo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080d13"/>
      <stop offset="52%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#101820"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="50%" stop-color="#7ee787"/>
      <stop offset="100%" stop-color="#f2cc60"/>
    </linearGradient>
    <clipPath id="revealClip">
      <rect class="reveal" x="42" y="70" width="1116" height="412"/>
    </clipPath>
    <style>
      .frame { fill: url(#bg); stroke: #30363d; stroke-width: 1.4; }
      .bar { fill: #111827; stroke: #30363d; stroke-width: 1; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .mono {
        font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 21px;
        font-weight: 700;
        letter-spacing: 0;
        fill: #c9d1d9;
        white-space: pre;
      }
      .title { fill: #e6edf3; font-size: 26px; font-weight: 800; }
      .small { font-size: 18px; font-weight: 600; }
      .muted { fill: #8b949e; }
      .cyan { fill: #58a6ff; }
      .green { fill: #7ee787; }
      .gold { fill: #f2cc60; }
      .pink { fill: #ff7b72; }
      .plain { fill: #c9d1d9; }
      .dim { fill: #6e7681; }
      .reveal {
        animation: revealWidth 5.6s steps(34, end) infinite;
      }
      .blink {
        animation: blink 1s steps(1, end) infinite;
      }
      .pulse {
        animation: pulse 2.8s ease-in-out infinite;
      }
      .float {
        animation: float 3.8s ease-in-out infinite;
      }
      .blinkEyes {
        animation: eyes 4.4s ease-in-out infinite;
      }
      @keyframes revealWidth {
        0% { width: 0; }
        18% { width: 0; }
        63% { width: 1116px; }
        100% { width: 1116px; }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.62; }
        50% { opacity: 1; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes eyes {
        0%, 92%, 100% { opacity: 1; }
        95%, 97% { opacity: 0.12; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="520" rx="18" class="frame"/>
  <rect x="24" y="24" width="1152" height="472" rx="14" fill="none" stroke="#21262d"/>
  <rect x="24" y="24" width="1152" height="44" rx="14" class="bar"/>
  <circle cx="54" cy="46" r="6" class="dot-red"/>
  <circle cx="76" cy="46" r="6" class="dot-yellow"/>
  <circle cx="98" cy="46" r="6" class="dot-green"/>
  <text x="140" y="53" class="mono small muted" fill="#8b949e">author_profile --boot --solo-fullstack --ai-infra</text>
  <text x="1128" y="53" text-anchor="end" class="mono small green pulse" fill="#7ee787">ONLINE</text>

  <g clip-path="url(#revealClip)">
    <text x="54" y="110" class="mono title" fill="#f0f6fc">FULLSTACK_1APE <tspan fill="#6e7681">//</tspan> <tspan fill="#7ee787">Member of Technical Staff</tspan><tspan fill="#6e7681">_</tspan><tspan fill="#58a6ff">AI Research Engineer</tspan></text>

    <text x="54" y="146" class="mono small green" fill="#7ee787">[OK]</text>
    <text x="100" y="146" class="mono small plain" fill="#c9d1d9">profile loaded</text>
    <text x="300" y="146" class="mono small cyan" fill="#58a6ff">[OK]</text>
    <text x="346" y="146" class="mono small plain" fill="#c9d1d9">agent runtime</text>
    <text x="520" y="146" class="mono small gold" fill="#f2cc60">[OK]</text>
    <text x="566" y="146" class="mono small plain" fill="#c9d1d9">gpu lane warm</text>

    <!-- code-ape avatar (a programmer is literally a "code ape") -->
    <g class="float">
      <text x="60" y="192" class="mono green" fill="#7ee787">       .-"""""-.</text>
      <text x="60" y="217" class="mono green" fill="#7ee787">      / .-   -. \</text>
      <text x="60" y="242" class="mono green blinkEyes" fill="#7ee787">     |  (o) (o)  |</text>
      <text x="60" y="267" class="mono green" fill="#7ee787">     |     &gt;     |</text>
      <text x="60" y="292" class="mono green" fill="#7ee787">     |   \___/   |</text>
      <text x="60" y="317" class="mono green" fill="#7ee787">      \         /</text>
      <text x="60" y="342" class="mono green" fill="#7ee787">   .--'.        '.--.</text>
      <text x="60" y="367" class="mono green" fill="#7ee787">  (    '--------'    )</text>
      <text x="60" y="392" class="mono green" fill="#7ee787">   '--.__________.--'</text>
      <text x="60" y="417" class="mono gold" fill="#f2cc60">       CODE_APE //</text>
    </g>
    <text x="60" y="448" class="mono small dim" fill="#6e7681">&gt; ships while you sleep</text>

    <!-- right column: who, the bar, the proof -->
    <text x="390" y="200" class="mono cyan" fill="#58a6ff">$ whoami</text>
    <text x="390" y="231" class="mono green" fill="#7ee787">&gt;</text>
    <text x="414" y="231" class="mono plain" fill="#c9d1d9">one ape · full stack · ships 0-&gt;1, solo</text>
    <text x="390" y="262" class="mono green" fill="#7ee787">&gt;</text>
    <text x="414" y="262" class="mono plain" fill="#c9d1d9">web power-user · HarmonyOS dev · AI-infra builder</text>
    <text x="390" y="293" class="mono gold" fill="#f2cc60">&gt; the harder it gets, the sharper i get</text>

    <rect x="390" y="312" width="700" height="2" fill="url(#rail)" opacity="0.9"/>

    <text x="390" y="348" class="mono cyan" fill="#58a6ff">$ ls ~/shipped --live</text>

    <text x="390" y="382" class="mono plain" fill="#c9d1d9">ai-health-platform</text>
    <text x="672" y="382" class="mono green" fill="#7ee787">[LIVE]</text>
    <text x="800" y="382" class="mono dim" fill="#8b949e">0-&gt;1 solo, in prod</text>

    <text x="390" y="413" class="mono plain" fill="#c9d1d9">prompt-optimizer</text>
    <text x="672" y="413" class="mono cyan" fill="#58a6ff">[ OSS]</text>
    <text x="800" y="413" class="mono dim" fill="#8b949e">open-source toolkit</text>

    <text x="390" y="444" class="mono plain" fill="#c9d1d9">llm-training-stack</text>
    <text x="672" y="444" class="mono gold" fill="#f2cc60">[8xH200]</text>
    <text x="800" y="444" class="mono dim" fill="#8b949e">distributed + vLLM</text>

    <text x="390" y="475" class="mono cyan" fill="#58a6ff">$</text>
    <text x="414" y="475" class="mono green blink" fill="#7ee787">_</text>
  </g>

  <rect x="42" y="70" width="1116" height="400" rx="10" fill="none" stroke="#30363d" opacity="0.8"/>
  <rect x="42" y="482" width="1116" height="2" fill="url(#rail)" opacity="0.75"/>
</svg>
